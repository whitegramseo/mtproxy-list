name: Update MTProto proxies

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-proxies:
    name: Fetch latest MTProto proxies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run proxy fetcher
        run: |
          python fetch_proxies.py

      - name: Commit updated proxy file
        run: |
          if git diff --quiet -- mtproto_proxies.json; then
            echo "mtproto_proxies.json was not changed. Nothing to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add mtproto_proxies.json
          git commit -m "Update MTProto proxies"
          git push